name: PR Check Complete - Discord Notify

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'

    steps:
      - name: Get PR info
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.workflow_run.head_branch;
            const owner = context.repo.owner;
            const prs = await github.rest.pulls.list({
              owner: owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${owner}:${branch}`
            });
            if (prs.data.length === 0) {
              core.setOutput('found', 'false');
              return;
            }
            const pr = prs.data[0];
            core.setOutput('found', 'true');
            core.setOutput('number', pr.number);
            core.setOutput('title', pr.title);
            core.setOutput('url', pr.html_url);
            core.setOutput('user', pr.user.login);
            core.setOutput('base', pr.base.ref);
            core.setOutput('head', pr.head.ref);

      - name: Send Discord notification
        if: steps.pr.outputs.found == 'true'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          PR_TITLE="${{ steps.pr.outputs.title }}"
          PR_URL="${{ steps.pr.outputs.url }}"
          PR_USER="${{ steps.pr.outputs.user }}"
          BASE="${{ steps.pr.outputs.base }}"
          HEAD="${{ steps.pr.outputs.head }}"
          SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${SHA:0:7}"
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.event.workflow_run.html_url }}"

          if [ "$CONCLUSION" = "success" ]; then
            COLOR=3066993; EMOJI="✅"; STATUS="成功"
          elif [ "$CONCLUSION" = "failure" ]; then
            COLOR=15158332; EMOJI="❌"; STATUS="失敗"
          elif [ "$CONCLUSION" = "cancelled" ]; then
            COLOR=9807270; EMOJI="⏹️"; STATUS="キャンセル"
          else
            COLOR=16776960; EMOJI="⚠️"; STATUS="$CONCLUSION"
          fi

          PAYLOAD=$(jq -n \
            --arg title "${EMOJI} PR #${PR_NUMBER} のCIチェックが完了しました" \
            --arg desc "[${PR_TITLE}](${PR_URL})" \
            --argjson color "$COLOR" \
            --arg status "[${STATUS}](${RUN_URL})" \
            --arg user "$PR_USER" \
            --arg branch "\`${HEAD}\` → \`${BASE}\`" \
            --arg sha "[\`${SHORT_SHA}\`](https://github.com/${REPO}/commit/${SHA})" \
            --arg repo "$REPO" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{embeds:[{title:$title,description:$desc,color:$color,fields:[
              {name:"📊 結果",value:$status,inline:true},
              {name:"👤 作成者",value:$user,inline:true},
              {name:"🔀 ブランチ",value:$branch,inline:false},
              {name:"🔗 コミット",value:$sha,inline:true}
            ],footer:{text:$repo},timestamp:$ts}]}')

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK"