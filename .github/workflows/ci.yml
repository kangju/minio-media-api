name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  pytest:
    name: Backend pytest
    runs-on: ubuntu-latest
    env:
      TEST_POSTGRES_USER: ci_test_user
      TEST_POSTGRES_PASSWORD: ci_test_password
      TEST_POSTGRES_DB: ci_test_db
      TEST_MINIO_USER: ci_test_minio
      TEST_MINIO_PASSWORD: ci_test_minio_password
      E2E_POSTGRES_USER: ci_e2e_user
      E2E_POSTGRES_PASSWORD: ci_e2e_password
      E2E_POSTGRES_DB: ci_e2e_db
      E2E_MINIO_USER: ci_e2e_minio
      E2E_MINIO_PASSWORD: ci_e2e_minio_password
    steps:
      - uses: actions/checkout@v4
      - name: Run pytest
        run: docker compose -f docker-compose.test.yml run --rm api-test
      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  compose-validate:
    name: Compose config validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 正常系 全変数セット時に config が成功する
        env:
          TEST_POSTGRES_USER: ci_test_user
          TEST_POSTGRES_PASSWORD: ci_test_password
          TEST_POSTGRES_DB: ci_test_db
          TEST_MINIO_USER: ci_test_minio
          TEST_MINIO_PASSWORD: ci_test_minio_password
          E2E_POSTGRES_USER: ci_e2e_user
          E2E_POSTGRES_PASSWORD: ci_e2e_password
          E2E_POSTGRES_DB: ci_e2e_db
          E2E_MINIO_USER: ci_e2e_minio
          E2E_MINIO_PASSWORD: ci_e2e_minio_password
        run: docker compose -f docker-compose.test.yml config --quiet
      - name: 異常系 変数未設定時に config が失敗する
        run: |
          if docker compose -f docker-compose.test.yml config --quiet 2>/dev/null; then
            echo "ERROR: 未設定変数があるのに config が成功してしまった"
            exit 1
          else
            echo "OK: 未設定変数で config が失敗した（期待通り）"
          fi

  jest:
    name: Frontend Jest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Run Jest
        run: npm test -- --watchAll=false --ci --passWithNoTests

  eslint:
    name: Frontend ESLint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Run ESLint
        run: npm run lint

  e2e-filters:
    name: E2E filters & general
    runs-on: ubuntu-latest
    env:
      TEST_POSTGRES_USER: ci_test_user
      TEST_POSTGRES_PASSWORD: ci_test_password
      TEST_POSTGRES_DB: ci_test_db
      TEST_MINIO_USER: ci_test_minio
      TEST_MINIO_PASSWORD: ci_test_minio_password
      E2E_POSTGRES_USER: ci_e2e_user
      E2E_POSTGRES_PASSWORD: ci_e2e_password
      E2E_POSTGRES_DB: ci_e2e_db
      E2E_MINIO_USER: ci_e2e_minio
      E2E_MINIO_PASSWORD: ci_e2e_minio_password
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet \
                      /usr/local/lib/android \
                      /opt/ghc \
                      /opt/hostedtoolcache/CodeQL \
                      /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY"
          df -h
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend
      - name: Install Python dependencies
        run: pip install pillow
      - name: Start E2E services
        run: |
          for attempt in 1 2 3; do
            echo "=== Attempt $attempt ==="
            docker compose -f docker-compose.test.yml up -d --build \
              api-server-test frontend-e2e clip-worker-e2e \
              && curl --retry 10 --retry-delay 3 --retry-connrefused \
                       --max-time 60 -sf http://localhost:3001 \
              && break
            echo "Attempt $attempt failed. Tearing down and retrying in 15s..."
            docker compose -f docker-compose.test.yml down -v 2>/dev/null || true
            sleep 15
          done
      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001 && break || sleep 5
          done
          curl -sf http://localhost:3001 || { echo "frontend did not start in time"; exit 1; }
      - name: Run Playwright (e2e project)
        run: npx playwright test --project=e2e
        working-directory: frontend
        env:
          PW_BASE_URL: http://localhost:3001
      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  e2e-bulk-upload:
    name: E2E bulk-upload
    runs-on: ubuntu-latest
    env:
      TEST_POSTGRES_USER: ci_test_user
      TEST_POSTGRES_PASSWORD: ci_test_password
      TEST_POSTGRES_DB: ci_test_db
      TEST_MINIO_USER: ci_test_minio
      TEST_MINIO_PASSWORD: ci_test_minio_password
      E2E_POSTGRES_USER: ci_e2e_user
      E2E_POSTGRES_PASSWORD: ci_e2e_password
      E2E_POSTGRES_DB: ci_e2e_db
      E2E_MINIO_USER: ci_e2e_minio
      E2E_MINIO_PASSWORD: ci_e2e_minio_password
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet \
                      /usr/local/lib/android \
                      /opt/ghc \
                      /opt/hostedtoolcache/CodeQL \
                      /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY"
          df -h
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend
      - name: Install Python dependencies
        run: pip install pillow
      - name: Start E2E services
        run: |
          for attempt in 1 2 3; do
            echo "=== Attempt $attempt ==="
            docker compose -f docker-compose.test.yml up -d --build \
              api-server-test frontend-e2e clip-worker-e2e \
              && curl --retry 10 --retry-delay 3 --retry-connrefused \
                       --max-time 60 -sf http://localhost:3001 \
              && break
            echo "Attempt $attempt failed. Tearing down and retrying in 15s..."
            docker compose -f docker-compose.test.yml down -v 2>/dev/null || true
            sleep 15
          done
      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001 && break || sleep 5
          done
          curl -sf http://localhost:3001 || { echo "frontend did not start in time"; exit 1; }
      - name: Run Playwright (e2e-bulk-upload project)
        run: npx playwright test --project=e2e-bulk-upload
        working-directory: frontend
        env:
          PW_BASE_URL: http://localhost:3001
      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

