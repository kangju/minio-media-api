name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  pytest:
    name: Backend pytest
    runs-on: ubuntu-latest
    env:
      TEST_POSTGRES_USER: ci_test_user
      TEST_POSTGRES_PASSWORD: ci_test_password
      TEST_POSTGRES_DB: ci_test_db
      TEST_MINIO_USER: ci_test_minio
      TEST_MINIO_PASSWORD: ci_test_minio_password
      E2E_POSTGRES_USER: ci_e2e_user
      E2E_POSTGRES_PASSWORD: ci_e2e_password
      E2E_POSTGRES_DB: ci_e2e_db
      E2E_MINIO_USER: ci_e2e_minio
      E2E_MINIO_PASSWORD: ci_e2e_minio_password
    steps:
      - uses: actions/checkout@v4
      - name: Run pytest
        run: docker compose -f docker-compose.test.yml run --rm api-test
      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  jest:
    name: Frontend Jest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Run Jest
        run: npm test -- --watchAll=false --ci --passWithNoTests

  eslint:
    name: Frontend ESLint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Run ESLint
        run: npm run lint
